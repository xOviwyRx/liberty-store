# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Debian/Ubuntu, the libpq-dev package provides the headers:
#   sudo apt-get install libpq-dev
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>

development:
  <<: *default
  database: liberty_store_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: liberty_store_test

# Production uses the Rails 8 Solid stack across separate databases:
# the primary application database plus dedicated databases for
# Solid Cache, Solid Queue, and Solid Cable.
production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "liberty_store_production") %>
  cache:
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "liberty_store_production") %>_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "liberty_store_production") %>_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "liberty_store_production") %>_cable
    migrations_paths: db/cable_migrate
