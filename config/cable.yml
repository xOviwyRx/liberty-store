# Use solid_cable in development too (matching production) rather than the
# in-memory async adapter — it persists broadcasts and polls, so updates
# survive the connection churn that async silently drops messages into.
development:
  adapter: solid_cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
